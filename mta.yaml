ID: navismaster
_schema-version: '3.1'
version: 1.0.0

modules:

  - name: navismaster-srv
    type: nodejs
    path: gen/srv
    requires:
      - name: navismaster-auth
      - name: navismaster-destination
      - name: navismaster-postgres
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter)
        properties:
          srv-url: ${default-url}

  - name: navismaster-app-deployer
    type: com.sap.application.content
    path: gen
    build-parameters:
      build-result: app/
      requires:
        - name: navismasternavismaster
          artifacts:
            - navismaster.zip
          target-path: app/
    requires:
      - name: srv-api
      - name: navismaster-html5-repo-host
        parameters:
          content-target: true
          config:
            HTML5Runtime_enabled: true
    parameters:
      config:
        destinations:
          - Name: navismaster-api
            URL: ~{srv-api/srv-url}
            Authentication: NoAuthentication
            Type: HTTP
            ProxyType: Internet
            HTML5.ForwardAuthToken: 'true'
            HTML5.DynamicDestination: 'true'

  - name: navismasternavismaster
    type: html5
    path: app/navismaster
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []

  - name: navismaster-destinations
    type: com.sap.application.content
    requires:
      - name: navismaster-html5-repo-host
        parameters:
          service-key:
            name: navismaster-html5-repo-host-key
      - name: srv-api
      - name: navismaster-destination
        parameters:
          content-target: true
    build-parameters:
      no-source: true
    parameters:
      content:
        instance:
          existing_destinations_policy: update
          destinations:
            - Name: navismaster-html5-repository
              ServiceInstanceName: navismaster-html5-repo-host
              ServiceKeyName: navismaster-html5-repo-host-key
              sap.cloud.service: navismaster.service

resources:

  - name: navismaster-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
  - name: navismaster-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            existing_destinations_policy: update
            destinations:
              - Name: navismaster-api
                Description: CAP backend API
                Authentication: NoAuthentication
                ProxyType: Internet
                Type: HTTP
                URL: ~{srv-api/srv-url}
                HTML5.ForwardAuthToken: 'true'
                HTML5.DynamicDestination: 'true'
    requires:
      - name: srv-api

  - name: navismaster-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
  - name: navismaster-postgres
    type: org.cloudfoundry.existing-service
    parameters:
      service-name: canopusIntigrate_postgreSQL
description: "A simple CAP project."
parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production